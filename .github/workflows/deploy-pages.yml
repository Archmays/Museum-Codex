name: Reusable Pages deployment

on:
  workflow_call:
    inputs:
      commit_sha:
        required: true
        type: string

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Assert artifact commit
        run: test '${{ inputs.commit_sha }}' = '${{ github.sha }}'

      - name: Deploy to GitHub Pages
        id: deployment
        # actions/deploy-pages v5.0.0
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128

      - name: Check out deployed commit for online closure
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Verify online build identity and candidate bytes
        run: >-
          python scripts/verify_museum_08_online.py
          --base-url '${{ steps.deployment.outputs.page_url }}'
          --commit '${{ inputs.commit_sha }}'
