name: Deploy Museum portal to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        # actions/setup-python v6.3.0
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12.7"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install governance dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Validate governance foundation
        run: python scripts/validate_governance_foundation.py

      - name: Validate source registry
        run: python scripts/validate_source_registry.py

      - name: Validate publishable media rights
        run: python scripts/validate_publishable_media_rights.py fixtures/governance/valid

      - name: Validate physical release fixture
        run: python scripts/validate_governance_foundation.py --release-root fixtures/release-bundles/valid/minimal

      - name: Verify offline pipeline source and adapter registries
        run: python -m museum_pipeline verify-sources --json

      - name: Validate pipeline schemas, fixtures, and recorded contracts
        run: python scripts/validate_pipeline_foundation.py

      - name: Validate MUSEUM-03A curation schemas, synthetic fixtures, and private-package boundaries
        run: python scripts/validate_artist_selection_preflight.py

      - name: Validate MUSEUM-03B formal art-batch synthetic fixtures
        run: python scripts/validate_museum_03b_fixtures.py

      - name: Validate sealed internal MUSEUM-03B reviewed package
        run: python scripts/validate_museum_03b_batch.py data/reviewed/art/museum-03b/museum-03b-first-slate-v1/package-v1

      - name: Scan static public inputs for candidate and formal art data
        run: python scripts/scan_public_artifact_for_candidate_data.py public --label-set data/reviewed/art/museum-03b/museum-03b-first-slate-v1/package-v1/public-leakage-label-set.json

      - name: Run Python tests
        run: python scripts/run_offline_python_tests.py

      - name: Set up Node.js
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.18.0"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run frontend tests
        run: npm test

      - name: Build production site
        run: npm run build

      - name: Check built asset paths and external runtime dependencies
        run: npm run check:build

      - name: Scan production artifact for raw, candidate, formal art, review, and media leakage
        run: python scripts/scan_public_artifact_for_candidate_data.py dist --label-set data/reviewed/art/museum-03b/museum-03b-first-slate-v1/package-v1/public-leakage-label-set.json

      - name: Scan repository for credentials and large files
        run: npm run check:safety

      - name: Configure Pages
        # actions/configure-pages v6.0.0
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Upload Pages artifact
        # actions/upload-pages-artifact v5.0.0
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # actions/deploy-pages v5.0.0
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
