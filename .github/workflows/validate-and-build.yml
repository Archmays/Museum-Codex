name: Classify, validate and build Museum portal

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: CI impact override
        required: true
        default: auto
        type: choice
        options:
          - auto
          - targeted
          - full

jobs:
  classify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      before: ${{ steps.base.outputs.before }}
      docs_only: ${{ steps.impact.outputs.docs_only }}
      runtime_changed: ${{ steps.impact.outputs.runtime_changed }}
      public_changed: ${{ steps.impact.outputs.public_changed }}
      full_required: ${{ steps.impact.outputs.full_required }}
      shared_core_changed: ${{ steps.impact.outputs.shared_core_changed }}
      dependencies_changed: ${{ steps.impact.outputs.dependencies_changed }}
      workflow_changed: ${{ steps.impact.outputs.workflow_changed }}
      affected_phases: ${{ steps.impact.outputs.affected_phases }}
      releases_to_rebuild: ${{ steps.impact.outputs.releases_to_rebuild }}
      releases_hash_only: ${{ steps.impact.outputs.releases_hash_only }}
      browser_suites: ${{ steps.impact.outputs.browser_suites }}
      deploy_required: ${{ steps.impact.outputs.deploy_required }}
      reason_codes: ${{ steps.impact.outputs.reason_codes }}
      impact_level: ${{ steps.impact.outputs.impact_level }}
    steps:
      - name: Check out exact commit with history
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Resolve comparison base
        id: base
        shell: bash
        run: |
          before='${{ github.event.before }}'
          if [[ -z "$before" ]]; then
            before="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi
          echo "before=$before" >> "$GITHUB_OUTPUT"

      - name: Classify changed paths and dependency closure
        id: impact
        env:
          MODE: ${{ github.event.inputs.mode || 'auto' }}
        run: |
          python scripts/classify_ci_impact.py \
            --before '${{ steps.base.outputs.before }}' \
            --after '${{ github.sha }}' \
            --mode "$MODE" \
            --output tmp/ci-impact.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Publish impact summary
        run: |
          {
            echo "### CI impact"
            echo "- Level: \`${{ steps.impact.outputs.impact_level }}\`"
            echo "- Reasons: \`${{ steps.impact.outputs.reason_codes }}\`"
            echo "- Affected phases: \`${{ steps.impact.outputs.affected_phases }}\`"
            echo "- Rebuild: \`${{ steps.impact.outputs.releases_to_rebuild }}\`"
            echo "- Hash-only: \`${{ steps.impact.outputs.releases_hash_only }}\`"
            echo "- Browser suites: \`${{ steps.impact.outputs.browser_suites }}\`"
            echo "- Deploy: \`${{ steps.impact.outputs.deploy_required }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  docs-only:
    needs: classify
    if: needs.classify.outputs.docs_only == 'true'
    concurrency:
      group: museum-validate-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/docs-check.yml
    with:
      before: ${{ needs.classify.outputs.before }}
      after: ${{ github.sha }}
      mode: ${{ github.event.inputs.mode || 'auto' }}

  phase-scoped:
    needs: classify
    if: needs.classify.outputs.docs_only != 'true' && needs.classify.outputs.full_required != 'true'
    concurrency:
      group: museum-validate-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Check out exact commit
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up Python
        # actions/setup-python v6.3.0
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12.7"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Validate historical release hashes
        run: python scripts/validate_release_integrity_ledger.py

      - name: Run affected release validators and builders
        env:
          REBUILDS: ${{ needs.classify.outputs.releases_to_rebuild }}
        run: |
          if [[ "$REBUILDS" == *"art-constellation-1.0.0"* ]]; then
            python scripts/build_museum_04_release.py --output tmp/museum-04-ci-release
            diff -ru public/releases/art-constellation-1.0.0 tmp/museum-04-ci-release
          fi
          if [[ "$REBUILDS" == *"art-gallery-interactions-1.1.0"* ]]; then
            python scripts/build_museum_05b_release.py --output tmp/museum-05b-ci-release
            diff -ru public/releases/art-gallery-interactions-1.1.0 tmp/museum-05b-ci-release
          fi
          if [[ "$REBUILDS" == *"art-pathways-1.2.0"* ]]; then
            python scripts/build_museum_06_release.py --output tmp/museum-06-ci-release
            diff -ru public/releases/art-pathways-1.2.0 tmp/museum-06-ci-release
          fi
          if [[ "$REBUILDS" == *"art-time-place-1.3.0"* ]]; then
            python scripts/build_museum_07_release.py --output tmp/museum-07-ci-release
            diff -ru public/releases/art-time-place-1.3.0 tmp/museum-07-ci-release
          fi
          if [[ "$REBUILDS" == *"art-v1-candidate-1.4.0"* ]]; then
            python scripts/build_museum_08_release.py --output tmp/museum-08-ci-release
            diff -ru public/releases/art-v1-candidate-1.4.0 tmp/museum-08-ci-release
          fi

      - name: Run M08 targeted Python closure
        if: contains(needs.classify.outputs.affected_phases, 'MUSEUM-08')
        run: >-
          python -m unittest
          tests.test_museum_08_ci_architecture
          tests.test_museum_08_candidate
          tests.test_museum_08_policy_scanners
          tests.test_museum_08_recovery
          tests.test_museum_08_scale

      - name: Set up Node.js
        if: needs.classify.outputs.runtime_changed == 'true'
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.18.0"
          cache: npm

      - name: Install frontend dependencies
        if: needs.classify.outputs.runtime_changed == 'true'
        run: npm ci

      - name: Run touched frontend checks
        if: needs.classify.outputs.runtime_changed == 'true'
        run: |
          npm run lint
          npm run typecheck
          npx vitest run src/tests/museum-08*.test.ts src/tests/museum-08*.test.tsx

      - name: Build production artifact
        if: needs.classify.outputs.deploy_required == 'true'
        run: |
          npm run build
          npm run check:build
          npm run check:museum-08-search
          npm run check:museum-08-budgets
          npm run check:safety
          python scripts/scan_museum_08_privacy.py dist
          python scripts/scan_museum_08_hardcoded_counts.py
          python scripts/scan_museum_08_synthetic_leakage.py public dist

      - name: Install Chromium for affected route suites
        if: needs.classify.outputs.deploy_required == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run M08 critical browser closure
        if: needs.classify.outputs.deploy_required == 'true'
        env:
          PLAYWRIGHT_JSON_OUTPUT: docs/qa/museum-08/playwright-results.json
        run: npm run test:e2e:museum-08

      - name: Bind Pages artifact to this commit
        if: needs.classify.outputs.deploy_required == 'true'
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          Path("dist/museum-build.json").write_text(
              json.dumps({"commit": os.environ["GITHUB_SHA"], "gate": "phase-scoped"}, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Configure Pages
        if: needs.classify.outputs.deploy_required == 'true'
        # actions/configure-pages v6.0.0
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Upload Pages artifact from the validated commit
        if: needs.classify.outputs.deploy_required == 'true'
        # actions/upload-pages-artifact v5.0.0
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: dist

  final-full:
    needs: classify
    if: needs.classify.outputs.docs_only != 'true' && needs.classify.outputs.full_required == 'true'
    concurrency:
      group: museum-validate-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/full-gate.yml
    with:
      deploy_required: ${{ needs.classify.outputs.deploy_required == 'true' }}

  deploy:
    needs: [classify, phase-scoped, final-full]
    if: >-
      always() &&
      needs.classify.outputs.deploy_required == 'true' &&
      (needs.phase-scoped.result == 'success' || needs.final-full.result == 'success')
    uses: ./.github/workflows/deploy-pages.yml
    with:
      commit_sha: ${{ github.sha }}
    permissions:
      contents: read
      pages: write
      id-token: write
