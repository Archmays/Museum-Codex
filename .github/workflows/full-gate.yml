name: Reusable final full gate

on:
  workflow_call:
    inputs:
      deploy_required:
        required: true
        type: boolean

jobs:
  full:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Check out exact commit
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up Python
        # actions/setup-python v6.3.0
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12.7"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install exact Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Set up Node.js
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.18.0"
          cache: npm

      - name: Clean frontend install
        run: npm ci

      - name: Validate historical releases by integrity ledger
        run: python scripts/validate_release_integrity_ledger.py --require-candidate

      - name: Validate governance, sources, rights and release closures
        run: |
          python scripts/validate_governance_foundation.py
          python scripts/validate_source_registry.py
          python scripts/validate_publishable_media_rights.py fixtures/governance/valid
          python scripts/validate_museum_04_release.py public/releases/art-constellation-1.0.0 --require-public
          python scripts/validate_museum_05a.py
          python scripts/validate_museum_05b_release.py public/releases/art-gallery-interactions-1.1.0 --require-public
          python scripts/validate_museum_06_release.py public/releases/art-pathways-1.2.0 --require-public
          python scripts/validate_museum_07_release.py public/releases/art-time-place-1.3.0
          python scripts/validate_museum_08_release.py public/releases/art-v1-candidate-1.4.0
          python scripts/validate_museum_08_scale.py --evidence docs/qa/museum-08/scale-readiness.json --check

      - name: Reproduce the synthetic scale gate outside public bytes
        run: |
          python scripts/generate_museum_08_scale_fixtures.py \
            --output tmp/museum-08-scale \
            --evidence tmp/museum-08-scale-evidence.json
          python scripts/validate_museum_08_scale.py \
            --evidence tmp/museum-08-scale-evidence.json \
            --fixture tmp/museum-08-scale

      - name: Rebuild only the current candidate release
        run: |
          python scripts/build_museum_08_release.py --output tmp/museum-08-ci-release
          diff -ru public/releases/art-v1-candidate-1.4.0 tmp/museum-08-ci-release

      - name: Run full offline Python suite
        run: python scripts/run_offline_python_tests.py

      - name: Run full frontend quality gate
        run: |
          npm run lint
          npm run typecheck
          npm test

      - name: Build production site
        run: npm run build

      - name: Verify production, budgets, privacy and leakage
        run: |
          npm run check:build
          npm run check:museum-04-budgets
          npm run check:museum-05b-budgets
          npm run check:museum-06-budgets
          npm run check:museum-07-budgets
          npm run check:safety
          python scripts/scan_public_artifact_for_candidate_data.py dist --label-set data/reviewed/art/museum-03b/museum-03b-first-slate-v1/package-v1/public-leakage-label-set.json
          python scripts/scan_museum_08_privacy.py dist
          python scripts/scan_museum_08_hardcoded_counts.py
          python scripts/scan_museum_08_synthetic_leakage.py public dist

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run complete browser and accessibility gate
        env:
          PLAYWRIGHT_JSON_OUTPUT: docs/qa/museum-08/playwright-results.json
        run: npm run test:e2e

      - name: Verify M08 search and candidate budgets
        run: |
          npm run check:museum-08-search
          npm run check:museum-08-budgets

      - name: Bind Pages artifact to this commit
        if: inputs.deploy_required
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          Path("dist/museum-build.json").write_text(
              json.dumps({"commit": os.environ["GITHUB_SHA"], "gate": "final-full"}, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Configure Pages
        if: inputs.deploy_required
        # actions/configure-pages v6.0.0
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Upload Pages artifact from the validated commit
        if: inputs.deploy_required
        # actions/upload-pages-artifact v5.0.0
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: dist
