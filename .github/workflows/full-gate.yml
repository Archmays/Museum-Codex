name: Reusable final full gate

on:
  workflow_call:
    inputs:
      deploy_required:
        required: true
        type: boolean

jobs:
  full:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Check out exact commit
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up Python
        # actions/setup-python v6.3.0
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12.7"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install exact Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Set up Node.js
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.18.0"
          cache: npm

      - name: Clean frontend install
        run: npm ci

      - name: Validate historical releases by integrity ledger
        run: python scripts/validate_release_integrity_ledger.py --require-candidate

      - name: Validate governance, sources, rights and release closures
        run: |
          python scripts/validate_governance_foundation.py
          python scripts/validate_governance_foundation.py --release-root fixtures/release-bundles/valid/minimal
          python scripts/validate_source_registry.py
          python scripts/validate_publishable_media_rights.py fixtures/governance/valid
          python -m museum_pipeline verify-sources --json
          python scripts/validate_pipeline_foundation.py
          python scripts/validate_artist_selection_preflight.py
          python scripts/validate_museum_03b_fixtures.py
          python scripts/validate_museum_03b_batch.py data/reviewed/art/museum-03b/museum-03b-first-slate-v1/package-v1
          python -m museum_pipeline.media validate-bundle --json
          python scripts/validate_museum_04_issue_form.py
          python scripts/validate_museum_08_scale.py --evidence docs/qa/museum-08/scale-readiness.json --check
          python scripts/validate_museum_09c.py public/releases/art-expansion-batch-02-1.6.0 --batch-id museum-09-batch-02 --release-id release:art-expansion-batch-02-1.6.0 --predecessor release:art-expansion-batch-01-1.5.1
          python scripts/validate_governance_foundation.py --release-root public/releases/art-expansion-batch-02-1.6.0

      - name: Verify sealed historical performance evidence hashes
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path

          expected = {
              "docs/qa/museum-04/performance-current-graph.json": "f861cad7ef8e8542f33c04d7af4f7a6fe522b4602f550cf2a62986d4513fe75b",
              "docs/qa/museum-04/performance-scale-benchmarks.json": "f03f3d75cdeb78beb1ef852607224b18d254feb3dc4be71b89e9871a9f7bbb50",
              "docs/qa/museum-05a/performance.json": "a151d49388f7ec03b843dd808adf19d6524ba2b32eef9a10929817d2336e7451",
              "docs/qa/museum-06/path-benchmark.json": "679680a90b5d45326f54c061e3a0e423e30c05ac8c71f0e165cd239bbb660d03",
              "docs/qa/museum-07/browser-metrics.json": "013dbeb0631b0b46319a4536d4d9865d0b4000763fc8b24dc9ccc098a7fadf98",
              "docs/qa/museum-07/bundle-budget.json": "cb173fd784346c29c20c066bec4bfe28fb54f4ddaa7fdc212770ef7b4319a124",
              "docs/qa/museum-08/search-performance.json": "fbb03de47bbeded2d3805aff0fda79728148115a2e0b36205c2125d616fd3a79",
              "docs/qa/museum-08/bundle-budget.json": "405bcdfa57bf089aa1e067fa5d996208e2f2cb6da251b4326c174f8eefd3fb83",
              "docs/qa/museum-08/browser-metrics.json": "cf567a43464e3089b7aee59b7394c9e5d2ac8de864bd971592c6f488a1e2cb27",
              "docs/qa/museum-08/scale-readiness.json": "8fe6bc8281ec1880ba27b0691478ba2c57748a69e93a9d8ee5afc536f42a1003",
          }
          actual = {
              path: hashlib.sha256(
                  Path(path).read_bytes().replace(b"\r\n", b"\n").replace(b"\r", b"\n")
              ).hexdigest()
              for path in expected
          }
          if actual != expected:
              raise SystemExit(f"sealed historical performance evidence drift: {actual}")
          print(f"[sealed-performance-evidence] PASS files={len(expected)}")
          PY

      - name: Rebuild only the current formal release
        run: |
          python scripts/run_museum_expansion_batch.py --batch-id museum-09-batch-02 --stage release --release-id release:art-expansion-batch-02-1.6.0 --predecessor release:art-expansion-batch-01-1.5.1 --output tmp/museum-09c-ci-release
          diff -ru public/releases/art-expansion-batch-02-1.6.0 tmp/museum-09c-ci-release

      - name: Run full offline Python suite
        run: python scripts/run_offline_python_tests.py

      - name: Run full frontend quality gate
        run: |
          npm run lint
          npm run typecheck
          npm test
          node --test tests/test_museum_04_*_lab_runner.mjs
          node --test tests/test_museum_08_ci_runner.mjs

      - name: Build production site
        run: npm run build

      - name: Verify production, budgets, privacy and leakage
        run: |
          npm run check:build
          npm run check:safety
          python scripts/scan_public_artifact_for_candidate_data.py public --label-set data/reviewed/art/museum-03b/museum-03b-first-slate-v1/package-v1/public-leakage-label-set.json
          python scripts/scan_public_artifact_for_candidate_data.py dist --label-set data/reviewed/art/museum-03b/museum-03b-first-slate-v1/package-v1/public-leakage-label-set.json
          python scripts/scan_museum_08_privacy.py dist
          python scripts/scan_museum_08_hardcoded_counts.py
          python scripts/scan_museum_08_synthetic_leakage.py public dist

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run complete browser and accessibility gate
        env:
          PLAYWRIGHT_JSON_OUTPUT: docs/qa/museum-09c/playwright-results.json
        run: npm run test:e2e

      - name: Verify current M09C search and release budgets
        run: |
          npm run check:museum-09b-search
          npm run check:museum-09b-budgets

      - name: Bind Pages artifact to this commit
        if: inputs.deploy_required
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          Path("dist/museum-build.json").write_text(
              json.dumps({"commit": os.environ["GITHUB_SHA"], "gate": "final-full"}, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Configure Pages
        if: inputs.deploy_required
        # actions/configure-pages v6.0.0
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Upload Pages artifact from the validated commit
        if: inputs.deploy_required
        # actions/upload-pages-artifact v5.0.0
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: dist
